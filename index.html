<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Feedback Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <form id="feedbackForm" novalidate>
      <h1>User Feedback Form</h1>
      <p class="subtitle">Share your feedback with us</p>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" />
        <small class="error"></small>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
        <small class="error"></small>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter 10-digit phone number" />
        <small class="error"></small>
      </div>

      <div class="form-group">
        <label for="topic">Feedback Topic</label>
        <select id="topic">
          <option value="">Select a topic</option>
          <option>Website Design</option>
          <option>Content Quality</option>
          <option>User Experience</option>
          <option>Technical Support</option>
        </select>
        <small class="error"></small>
      </div>

      <div class="form-group">
        <label>How would you rate your experience?</label>
        <div class="radio-group">
          <label><input type="radio" name="rating" value="Excellent" /> Excellent</label>
          <label><input type="radio" name="rating" value="Good" /> Good</label>
          <label><input type="radio" name="rating" value="Average" /> Average</label>
        </div>
        <small class="error" id="ratingError"></small>
      </div>

      <div class="form-group">
        <label for="message">Your Feedback</label>
        <textarea id="message" rows="5" placeholder="Write your feedback here..."></textarea>
        <small class="error"></small>
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="terms" />
          I confirm that the above information is correct.
        </label>
        <small class="error" id="termsError"></small>
      </div>

      <button type="submit">Submit Feedback</button>
      <p id="successMessage" class="success-message"></p>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
